<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPU Comparison Database</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .controls {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .filter-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .filter-group label {
            font-weight: 600;
            color: #333;
        }

        .filter-group select {
            padding: 8px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 1em;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        .filter-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .slider-group {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .slider-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .slider-item label {
            font-weight: 600;
            color: #333;
            font-size: 0.9em;
        }

        .slider-inputs {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .slider-inputs input {
            width: 60px;
            padding: 6px 8px;
            border: 2px solid #e0e0e0;
            border-radius: 4px;
            font-size: 0.9em;
        }

        .slider-inputs input:focus {
            outline: none;
            border-color: #667eea;
        }

        .slider-inputs span {
            color: #666;
            font-size: 0.9em;
        }

        .toggle-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .toggle-group label {
            font-weight: 600;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .toggle-switch {
            position: relative;
            width: 44px;
            height: 24px;
            background: #e0e0e0;
            border-radius: 12px;
            transition: background 0.3s;
            cursor: pointer;
            border: none;
            padding: 0;
        }

        .toggle-switch.active {
            background: #667eea;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: left 0.3s;
        }

        .toggle-switch.active::after {
            left: 22px;
        }

        .stats {
            background: white;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #666;
            font-size: 0.95em;
        }

        .table-wrapper {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            position: sticky;
            top: 0;
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }

        th:hover {
            background: rgba(0, 0, 0, 0.1);
        }

        th.sortable::after {
            content: ' ⇅';
            opacity: 0.5;
        }

        th.sorted-asc::after {
            content: ' ↑';
            opacity: 1;
        }

        th.sorted-desc::after {
            content: ' ↓';
            opacity: 1;
        }

        .model-size-header {
            font-size: 0.85em;
            cursor: default;
        }

        .model-size-header::after {
            content: none;
        }

        .model-pd {
            font-size: 0.9em;
            white-space: nowrap;
        }

        .pd-prefill {
            color: #667eea;
            font-weight: 500;
        }

        .pd-decode {
            color: #764ba2;
            font-weight: 500;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #f0f0f0;
        }

        tbody tr {
            transition: background 0.2s;
        }

        tbody tr:hover {
            background: #f8f9ff;
        }

        tbody tr:nth-child(even) {
            background: #fafbff;
        }

        .brand-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.85em;
        }

        .brand-amd {
            background: #ff6b35;
            color: white;
        }

        .brand-nvidia {
            background: #76b900;
            color: white;
        }

        .brand-intel {
            background: #0071c5;
            color: white;
        }

        .brand-other {
            background: #999;
            color: white;
        }

        .no-data {
            color: #999;
            font-style: italic;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }

        .empty-state p {
            font-size: 1.1em;
        }

        footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            padding: 20px;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .controls {
                flex-direction: column;
            }

            .search-box {
                min-width: 100%;
            }

            .filter-group {
                width: 100%;
                flex-direction: column;
                align-items: flex-start;
            }

            th, td {
                padding: 10px;
                font-size: 0.9em;
            }

            .brand-badge {
                font-size: 0.75em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 GPU Comparison Database</h1>
            <p class="subtitle">Browse and compare graphics cards across different manufacturers</p>
        </header>

        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search by GPU name...">
            </div>
            <div class="filter-group">
                <label for="brandFilter">Brand:</label>
                <select id="brandFilter">
                    <option value="">All Brands</option>
                </select>
            </div>
        </div>

        <div class="slider-group">
            <div class="slider-item">
                <label>Release Year</label>
                <div class="slider-inputs">
                    <input type="number" id="yearFrom" min="1990" max="2026" placeholder="From">
                    <span>–</span>
                    <input type="number" id="yearTo" min="1990" max="2026" placeholder="To">
                </div>
            </div>
            <div class="slider-item">
                <label>Memory (GB)</label>
                <div class="slider-inputs">
                    <input type="number" id="memoryFrom" min="0" step="1" placeholder="From">
                    <span>–</span>
                    <input type="number" id="memoryTo" min="0" step="1" placeholder="To">
                </div>
            </div>
            <div class="toggle-group">
                <label>
                    <button id="tensorCoresToggle" class="toggle-switch"></button>
                    Require Tensor Cores
                </label>
            </div>
        </div>

        <div class="stats">
            <span id="statsText">Loading data...</span>
        </div>

        <div class="table-wrapper">
            <table id="gpuTable">
                <thead>
                    <tr>
                        <th class="sortable">Brand</th>
                        <th class="sortable">Model Name</th>
                        <th class="sortable">Release Date</th>
                        <th class="sortable">Memory (GB)</th>
                        <th class="sortable">Bandwidth</th>
                        <th class="sortable">Compute (TFLOPs)</th>
                        <th class="sortable">Tensor Cores</th>
                        <th class="model-size-header" title="Prefill/Decode throughput in tokens/sec for 3B parameters">3B</th>
                        <th class="model-size-header" title="Prefill/Decode throughput in tokens/sec for 7B parameters">7B</th>
                        <th class="model-size-header" title="Prefill/Decode throughput in tokens/sec for 14B parameters">14B</th>
                    </tr>
                </thead>
                <tbody id="gpuTableBody">
                </tbody>
            </table>
        </div>

        <footer>
            <p>GPU Comparison Database • Data sourced from public GPU specifications</p>
        </footer>
    </div>

                const matchYearTo = !gpu.releaseDate || gpu.releaseDate <= yearTo;
                const matchMemoryFrom = !gpu.memory || gpu.memory >= memoryFrom;
                const matchMemoryTo = !gpu.memory || gpu.memory <= memoryTo;

        // Calculate Prefill/Decode times
        function calculatePD(gpu) {
            // Extract numeric values
            const computeTFLOPs = parseFloat(gpu.compute?.match(/[\d.]+/)?.[0] || 0);

                const prefillComputeTime = (prefillFLOPs / 1e12) / effectiveTFLOPs;
                const prefillBandwidthTime = modelSizeBytes / effectiveBandwidth;
                const prefillTotalTime = Math.max(prefillComputeTime, prefillBandwidthTime);
                
                // Convert to tokens/second
                const prefillTokPerSec = N_prefill / prefillTotalTime;
                
                results[size] = {
                    prefill: prefillTokPerSec.toFixed(0),     // tok/s
                    decode: decodeTokPerSec.toFixed(1)        // tok/s
                };
            }
            
            return results;
        }

        // Render table
        function renderTable() {
            const tbody = document.getElementById('gpuTableBody');
            const statsText = document.getElementById('statsText');

            if (filteredData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10" class="empty-state"><p>No GPUs found matching your criteria</p></td></tr>';
                statsText.textContent = 'No results';
                return;
            }

            tbody.innerHTML = filteredData.map(gpu => {
                const pd = calculatePD(gpu);
                return `
                <tr>
                    <td><span class="brand-badge brand-${gpu.brand.toLowerCase()}">${gpu.brand}</span></td>
                    <td>${gpu.name}</td>
                    <td>${gpu.releaseDate ? Math.floor(gpu.releaseDate) : '<span class="no-data">N/A</span>'}</td>
                    <td>${gpu.memory ? gpu.memory + ' GB' : '<span class="no-data">N/A</span>'}</td>
                    <td>${gpu.bandwidth || '<span class="no-data">N/A</span>'}</td>
                    <td>${gpu.compute || '<span class="no-data">N/A</span>'}</td>
                    <td>${gpu.tensorCores || '<span class="no-data">N/A</span>'}</td>
                    <td class="model-pd"><span class="pd-prefill">${pd['3B'].prefill}p</span> / <span class="pd-decode">${pd['3B'].decode}d</span></td>
                    <td class="model-pd"><span class="pd-prefill">${pd['7B'].prefill}p</span> / <span class="pd-decode">${pd['7B'].decode}d</span></td>
                    <td class="model-pd"><span class="pd-prefill">${pd['14B'].prefill}p</span> / <span class="pd-decode">${pd['14B'].decode}d</span></td>
                </tr>
            `;
            }).join('');

            statsText.textContent = `Showing ${filteredData.length} of ${gpuData.length} GPUs`;
        }

        // Start the app
        init();
    </script>
</body>
</html>
